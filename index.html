<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Makeup Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #faf7f6;
}

header {
    height: 90vh;
    background: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}

header h1 {
    font-size: 3.5em;
    background: rgba(0,0,0,0.5);
    padding: 20px 40px;
    border-radius: 10px;
}

.section {
    padding: 60px 40px;
    max-width: 1300px;
    margin: auto;
}

.section h2 {
    text-align: center;
    margin-bottom: 40px;
    color: #ff4f81;
}

/* PRODUCT GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.card-content {
    padding: 20px;
    text-align: center;
}

.price {
    color: #ff4f81;
    font-weight: bold;
    margin: 10px 0;
}

.btn {
    background: #ff4f81;
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
}

/* IMAGE GALLERY */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.gallery img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.08);
}

/* FOOTER */
footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <h1>Luxury Beauty Collection</h1>
</header>

<!-- PRODUCT SECTION -->
<section class="section">
    <h2>Featured Products</h2>
    <div class="grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
            <div class="card-content">
                <h3>Matte Lipstick</h3>
                <p>Long-lasting premium color</p>
                <div class="price">₹799</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
            <div class="card-content">
                <h3>Liquid Foundation</h3>
                <p>Flawless smooth skin</p>
                <div class="price">₹1,299</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba6">
            <div class="card-content">
                <h3>Eyeshadow Palette</h3>
                <p>Bright & bold shades</p>
                <div class="price">₹999</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
            <div class="card-content">
                <h3>Makeup Kit</h3>
                <p>Complete beauty set</p>
                <div class="price">₹2,499</div>
                <button class="btn">Buy Now</button>
            </div>
        </div>

    </div>
</section>

<!-- IMAGE GALLERY -->
<section class="section">
    <h2>Beauty Gallery</h2>
    <div class="gallery">

        <img src="https://images.unsplash.com/photo-1512496015851-a90fb38ba796">
        <img src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9">
        <img src="https://images.unsplash.com/photo-1583001931096-959e9a1a6223">
        <img src="https://images.unsplash.com/photo-1603570419986-8d5c8d9d3f70">
        <img src="https://images.unsplash.com/photo-1616394584738-fc6e612e71b9">
        <img src="https://images.unsplash.com/photo-1598440947619-2c35fc9aa908">
        <img src="https://images.unsplash.com/photo-1596704017254-9f71c5e4d6f0">
        <img src="https://images.unsplash.com/photo-1611078489935-0cb964de46d6">

    </div>
</section>

<footer>
    © 2026 Luxury Beauty | Designed with ❤️
</footer>

</body>
</html>
